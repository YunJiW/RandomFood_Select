<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점심 뭐 먹지?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Gmarket+Sans:wght@500;700&display=swap');
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

    :root {
      --bg:       #0d0d0f;
      --surface:  #17171a;
      --surface2: #202025;
      --border:   #2a2a30;
      --accent:   #ff6b35;
      --accent2:  #ffb347;
      --text:     #eeeef0;
      --muted:    #777;
      --danger:   #e05252;
      --success:  #4eca7f;
      --excluded: #1e1e22;
      --font:     'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      --font-display: 'Gmarket Sans', var(--font);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Titlebar ── */
    #titlebar {
      -webkit-app-region: drag;
      height: 40px;
      background: var(--bg);
      display: flex; align-items: center;
      padding: 0 14px; gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #titlebar span { font-size: 12px; color: var(--muted); font-weight: 500; flex: 1; }
    .win-btns {
      -webkit-app-region: no-drag;
      display: flex; align-items: center; gap: 7px;
    }
    .dot {
      width: 13px; height: 13px; border-radius: 50%;
      cursor: pointer; border: none; padding: 0;
      display: flex; align-items: center; justify-content: center;
      transition: filter 0.15s, transform 0.1s;
      flex-shrink: 0; position: relative;
    }
    .dot:hover { filter: brightness(1.15); transform: scale(1.1); }
    .dot:active { transform: scale(0.92); }
    .dot.r { background: #ff5f57; }
    .dot.y { background: #febc2e; }
    .dot.g { background: #28c840; }
    .dot::after {
      content: ''; font-size: 8px; font-weight: 900;
      color: rgba(0,0,0,0.45); position: absolute; line-height: 1;
    }
    .dot.r:hover::after { content: '✕'; }
    .dot.y:hover::after { content: '−'; font-size: 10px; }
    .dot.g:hover::after { content: '+'; }

    /* ── Layout ── */
    #app { display: grid; grid-template-columns: 1fr 300px; flex: 1; overflow: hidden; }

    /* ── Left Panel ── */
    #left { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }

    /* ── Tabs ── */
    #tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
    .tab {
      padding: 11px 18px; font-size: 12px; font-weight: 600;
      color: var(--muted); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s; letter-spacing: 0.2px;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Tab Content ── */
    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ── Pick Tab ── */
    .pick-title { font-family: var(--font-display); font-size: 22px; color: var(--muted); }

    /* ── 카테고리 필터 ── */
    #cat-filter { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
    .cat-btn {
      padding: 4px 11px; font-size: 11px; font-weight: 600; font-family: var(--font);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .cat-btn.active { background: rgba(255,107,53,0.15); border-color: var(--accent); color: var(--accent); }
    .cat-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }

    /* ── 쿨다운 / 즐겨찾기 옵션 바 ── */
    #pick-options {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center;
    }
    .opt-label { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .opt-label select {
      padding: 2px 5px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 11px; font-family: var(--font);
      outline: none; cursor: pointer;
    }
    .opt-toggle {
      padding: 4px 10px; font-size: 11px; font-weight: 600; font-family: var(--font);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 20px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    .opt-toggle.active { background: rgba(255,215,0,0.12); border-color: gold; color: gold; }

    /* ── 즐겨찾기 버튼 ── */
    .icon-btn.fav-btn { color: var(--border); }
    .icon-btn.fav-btn.active { color: gold; }
    .icon-btn.fav-btn:hover { color: gold !important; background: rgba(255,215,0,0.1) !important; }

    #result-card {
      width: 300px; height: 160px;
      background: var(--surface); border: 1.5px solid var(--border); border-radius: 18px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative; overflow: hidden;
    }
    #result-card.glow { border-color: var(--accent); box-shadow: 0 0 36px rgba(255,107,53,0.2); }
    #result-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 120%, rgba(255,107,53,0.06) 0%, transparent 70%);
    }
    #result-category { font-size: 11px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    #result-name { font-family: var(--font-display); font-size: 40px; color: var(--text); font-weight: 700; }
    #result-name.pop { animation: pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    #pick-btn {
      padding: 14px 44px;
      font-family: var(--font-display); font-size: 18px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 50px; color: #fff; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 18px rgba(255,107,53,0.35);
    }
    #pick-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.45); }
    #pick-btn:active { transform: translateY(0); }
    #pick-info { font-size: 11px; color: var(--muted); font-weight: 500; }

    /* ── Wheel Tab ── */
    #wheel-tab { flex-direction: row !important; overflow: hidden; }

    #wheel-left {
      flex: 1; min-width: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; padding: 12px;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .wheel-container { position: relative; width: 280px; height: 280px; flex-shrink: 0; }
    #wheelCanvas {
      width: 280px; height: 280px;
      border-radius: 50%;
      box-shadow: 0 0 28px rgba(255,107,53,0.15), 0 0 0 3px var(--border);
      display: block;
    }
    .wheel-pointer {
      position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
      font-size: 22px; color: var(--accent);
      filter: drop-shadow(0 2px 5px rgba(255,107,53,0.7));
      z-index: 10; line-height: 1;
    }
    #wheel-btn {
      padding: 10px 36px;
      font-family: var(--font-display); font-size: 16px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 50px; color: #fff; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 18px rgba(255,107,53,0.35); flex-shrink: 0;
    }
    #wheel-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.45); }
    #wheel-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .wheel-result-box {
      height: 28px;
      font-family: var(--font-display); font-size: 17px; font-weight: 700;
      color: var(--accent); text-align: center; flex-shrink: 0;
    }

    /* 우측: 가중치 패널 */
    #wheel-right {
      width: 220px; flex-shrink: 0;
      display: flex; flex-direction: column;
      background: var(--surface);
      overflow: hidden;
    }
    .weight-header {
      padding: 11px 13px 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .weight-header h3 { font-size: 12px; font-weight: 700; }
    .btn-reset-weights {
      font-size: 10px; padding: 3px 8px;
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); cursor: pointer; font-family: var(--font);
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-reset-weights:hover { color: var(--accent); border-color: var(--accent); }

    #weight-list {
      flex: 1; overflow-y: auto; padding: 7px;
      display: flex; flex-direction: column; gap: 4px;
    }
    #weight-list::-webkit-scrollbar { width: 3px; }
    #weight-list::-webkit-scrollbar-track { background: transparent; }
    #weight-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .weight-item {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 7px;
      background: var(--surface2); border-radius: 7px; border: 1px solid var(--border);
    }
    .weight-item.excluded { opacity: 0.3; }

    .weight-pct {
      font-size: 10px; font-weight: 700; color: var(--accent);
      background: rgba(255,107,53,0.1);
      padding: 1px 5px; border-radius: 4px;
      min-width: 36px; text-align: right; flex-shrink: 0;
    }
    .weight-name {
      flex: 1; font-size: 11px; font-weight: 600;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .weight-controls { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .wc-btn {
      width: 20px; height: 20px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 13px; font-weight: 700; line-height: 1;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .wc-btn:hover:not(:disabled) { background: var(--accent); border-color: var(--accent); color: #fff; }
    .wc-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .wc-btn.wc-del:hover:not(:disabled) { background: var(--danger); border-color: var(--danger); }
    .wc-input {
      width: 30px; height: 20px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 11px; font-weight: 700; font-family: var(--font);
      text-align: center; outline: none;
    }
    .wc-input:focus { border-color: var(--accent); }
    /* 숫자 스피너 숨기기 */
    .wc-input::-webkit-inner-spin-button,
    .wc-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── 메뉴 추가 공통 ── */
    .menu-add-bar {
      display: flex; gap: 6px; flex-shrink: 0;
      padding: 10px 14px; border-top: 1px solid var(--border);
      background: var(--surface);
    }
    .menu-add-bar input {
      flex: 1; padding: 7px 10px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 12px; font-family: var(--font); outline: none;
      transition: border-color 0.2s; font-weight: 500;
    }
    .menu-add-bar input:focus { border-color: var(--accent); }
    .menu-add-bar select {
      padding: 7px 7px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 11px; font-family: var(--font); outline: none; cursor: pointer;
    }
    .btn-add {
      padding: 7px 13px; background: var(--accent); border: none; border-radius: 7px;
      color: #fff; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font);
      transition: background 0.2s; flex-shrink: 0;
    }
    .btn-add:hover { background: #e55a28; }

    /* ── Pick Tab 메뉴 목록 ── */
    #pick-tab { justify-content: flex-start !important; padding: 0 !important; gap: 0 !important; }
    #pick-main { display: flex; flex-direction: column; align-items: center; gap: 22px; padding: 28px 40px 18px; flex-shrink: 0; }
    #pick-menu-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; padding: 8px 10px; }
    #pick-menu-list::-webkit-scrollbar { width: 3px; }
    #pick-menu-list::-webkit-scrollbar-track { background: transparent; }
    #pick-menu-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── 돌림판 메뉴 추가 바 ── */
    .wheel-add-bar {
      display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 8px 7px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .wheel-add-bar input {
      width: 100%; padding: 5px 8px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 11px; font-family: var(--font); outline: none;
      transition: border-color 0.2s; box-sizing: border-box;
    }
    .wheel-add-bar input:focus { border-color: var(--accent); }
    .wheel-add-bar select {
      flex: 1; padding: 5px 5px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 10px; font-family: var(--font); outline: none; cursor: pointer;
    }
    .wheel-add-bar .btn-add { padding: 5px 14px; font-size: 11px; border-radius: 6px; flex-shrink: 0; }

    .menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 11px;
      background: var(--surface); border-radius: 9px; border: 1px solid var(--border);
      transition: opacity 0.2s, background 0.2s;
    }
    .menu-item.excluded { opacity: 0.35; background: var(--excluded); }
    .menu-item .cat-badge {
      font-size: 10px; padding: 2px 7px; border-radius: 20px;
      background: rgba(255,107,53,0.12); color: var(--accent); font-weight: 600; white-space: nowrap;
    }
    .menu-item .menu-name { flex: 1; font-size: 13px; font-weight: 600; }
    .menu-item .excluded-tag {
      font-size: 10px; color: var(--muted); background: var(--surface2); padding: 1px 5px; border-radius: 4px;
    }
    .icon-btn {
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 4px; border-radius: 4px; font-size: 13px;
      transition: color 0.15s, background 0.15s; line-height: 1;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.danger:hover { color: var(--danger); }
    .menu-item:not(.excluded) .icon-btn.exclude-btn:hover { color: var(--danger); }
    .menu-item.excluded .icon-btn.exclude-btn { color: var(--success); }

    /* ── 마블 룰렛 탭 ── */
    #marble-tab { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; overflow: hidden; }
    #marble-layout { display: flex; gap: 8px; flex: 1; min-height: 0; overflow: hidden; }
    #marbleMinimap {
      flex-shrink: 0; width: 68px;
      border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface); display: block;
    }
    #marble-track-wrap {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface);
    }
    #marble-track-wrap::-webkit-scrollbar { width: 3px; }
    #marble-track-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    #marbleCanvas { display: block; }
    #marble-controls { display: flex; align-items: center; gap: 10px; flex-shrink: 0; justify-content: center; }
    #marble-start-btn {
      padding: 10px 36px;
      font-family: var(--font-display); font-size: 15px; font-weight: 700; letter-spacing: 1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 50px; color: #fff; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 18px rgba(255,107,53,0.35);
    }
    #marble-start-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.45); }
    #marble-start-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    #marble-skip-btn {
      padding: 10px 20px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 50px;
      color: var(--muted); cursor: pointer; transition: all 0.15s;
    }
    #marble-skip-btn:hover:not(:disabled) { color: var(--text); border-color: var(--text); }
    #marble-skip-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #marble-result {
      font-family: var(--font-display); font-size: 18px; font-weight: 700;
      color: var(--accent); height: 24px; text-align: center; flex-shrink: 0;
    }

    /* ── Right Panel (History) ── */
    #right { display: flex; flex-direction: column; background: var(--surface); }
    .panel-header {
      padding: 13px 14px 11px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .panel-header h3 { font-size: 12px; font-weight: 700; }
    .btn-clear {
      font-size: 10px; padding: 3px 8px;
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); cursor: pointer; font-family: var(--font);
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-clear:hover { color: var(--danger); border-color: var(--danger); }

    /* ── 패널 탭 (기록 / 통계) ── */
    .panel-tabs { display: flex; gap: 0; }
    .ptab {
      font-size: 11px; font-weight: 700; padding: 2px 10px 2px 0;
      color: var(--muted); cursor: pointer; transition: color 0.15s;
      border-bottom: 2px solid transparent;
    }
    .ptab.active { color: var(--text); border-bottom-color: var(--accent); }
    .ptab:hover:not(.active) { color: var(--text); }
    .panel-view { display: none; flex: 1; overflow-y: auto; }
    .panel-view.active { display: flex; flex-direction: column; }

    #history-list { padding: 10px; gap: 5px; }
    #stats-content { padding: 10px; gap: 6px; }

    .stats-section-title {
      font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px;
      text-transform: uppercase; padding: 4px 0 2px;
    }
    .stat-item {
      display: flex; align-items: center; gap: 7px;
      padding: 7px 10px; background: var(--surface2); border-radius: 7px;
    }
    .stat-rank { font-size: 11px; font-weight: 800; color: var(--accent); min-width: 16px; text-align: center; }
    .stat-name { flex: 1; font-size: 12px; font-weight: 600; }
    .stat-bar-wrap { width: 50px; background: var(--border); border-radius: 3px; height: 4px; flex-shrink: 0; }
    .stat-bar { height: 4px; border-radius: 3px; background: var(--accent); }
    .stat-count { font-size: 10px; color: var(--muted); font-weight: 600; min-width: 22px; text-align: right; }
    .stat-empty { text-align: center; color: var(--muted); font-size: 12px; padding: 32px 16px; }

    #history-list { padding: 10px; gap: 5px; }
    #history-list::-webkit-scrollbar { width: 3px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px; background: var(--surface2); border-radius: 7px;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { transform: translateX(14px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .history-name { font-size: 12px; font-weight: 600; }
    .history-time { font-size: 10px; color: var(--muted); }
    .empty-state { text-align: center; color: var(--muted); font-size: 12px; padding: 32px 16px; line-height: 2; }

    /* ── Edit Modal ── */
    #modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 100;
      align-items: center; justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 24px; width: 310px; display: flex; flex-direction: column; gap: 13px;
    }
    #modal h3 { font-size: 15px; font-weight: 700; }
    #modal input, #modal select {
      width: 100%; padding: 9px 12px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 13px; font-family: var(--font); outline: none; font-weight: 500;
    }
    #modal input:focus, #modal select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 7px; justify-content: flex-end; }
    .btn-cancel {
      padding: 8px 16px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600;
    }
    .btn-save {
      padding: 8px 16px; background: var(--accent); border: none; border-radius: 7px;
      color: #fff; font-weight: 700; cursor: pointer; font-family: var(--font); font-size: 12px;
    }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      padding: 8px 18px; font-size: 12px; font-weight: 600; color: var(--text);
      transition: transform 0.28s ease; z-index: 200; pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="titlebar">
  <span>점심 뭐 먹지? 🍱</span>
  <div class="win-btns">
    <button class="dot g" onclick="window.api.maximizeApp()" title="최대화"></button>
    <button class="dot y" onclick="window.api.minimizeApp()" title="최소화"></button>
    <button class="dot r" onclick="window.api.closeApp()" title="종료"></button>
  </div>
</div>

<div id="app">
  <div id="left">
    <div id="tabs">
      <div class="tab active" data-tab="pick">랜덤 뽑기</div>
      <div class="tab" data-tab="wheel">돌림판</div>
      <div class="tab" data-tab="marble">마블 룰렛</div>
    </div>

    <!-- Pick Tab -->
    <div class="tab-content active" id="pick-tab">
      <div id="pick-main">
        <div class="pick-title">오늘의 점심은?</div>
        <div id="cat-filter">
          <button class="cat-btn active" data-cat="전체">전체</button>
          <button class="cat-btn active" data-cat="한식">한식</button>
          <button class="cat-btn active" data-cat="중식">중식</button>
          <button class="cat-btn active" data-cat="일식">일식</button>
          <button class="cat-btn active" data-cat="양식">양식</button>
          <button class="cat-btn active" data-cat="분식">분식</button>
          <button class="cat-btn active" data-cat="기타">기타</button>
        </div>
        <div id="result-card">
          <div id="result-category">메뉴를 뽑아보세요</div>
          <div id="result-name">?</div>
        </div>
        <button id="pick-btn" onclick="pickRandom()">뽑 기 !</button>
        <div id="pick-options">
          <label class="opt-label">
            쿨다운
            <select id="cooldown-select" onchange="updatePickInfo()">
              <option value="0">없음</option>
              <option value="1">1일</option>
              <option value="3">3일</option>
              <option value="7">7일</option>
            </select>
          </label>
          <button class="opt-toggle" id="fav-toggle" onclick="toggleFavOnly()">★ 즐겨찾기만</button>
        </div>
        <div id="pick-info"></div>
      </div>
      <div id="pick-menu-list"></div>
      <div class="menu-add-bar">
        <input type="text" id="new-name" placeholder="메뉴 이름 입력" />
        <select id="new-category">
          <option>한식</option><option>중식</option><option>일식</option>
          <option>양식</option><option>분식</option><option>기타</option>
        </select>
        <button class="btn-add" onclick="addMenu()">추가</button>
      </div>
    </div>

    <!-- Marble Tab -->
    <div class="tab-content" id="marble-tab">
      <div id="marble-layout">
        <canvas id="marbleMinimap"></canvas>
        <div id="marble-track-wrap">
          <canvas id="marbleCanvas"></canvas>
        </div>
      </div>
      <div id="marble-result"></div>
      <div id="marble-controls">
        <button id="marble-start-btn" onclick="startMarble()">출 발 !</button>
        <button id="marble-skip-btn" onclick="skipMarble()" disabled>건너뛰기</button>
      </div>
    </div>

    <!-- Wheel Tab -->
    <div class="tab-content" id="wheel-tab">
      <div id="wheel-left">
        <div class="wheel-container">
          <canvas id="wheelCanvas" width="280" height="280"></canvas>
          <div class="wheel-pointer">▼</div>
        </div>
        <button id="wheel-btn" onclick="spinWheel()">돌 리 기 !</button>
        <div id="wheel-result" class="wheel-result-box"></div>
      </div>
      <div id="wheel-right">
        <div class="weight-header">
          <h3>⚖ 가중치 설정</h3>
          <button class="btn-reset-weights" onclick="resetWeights()">초기화</button>
        </div>
        <div class="wheel-add-bar">
          <input type="text" id="wheel-new-name" placeholder="메뉴 추가" />
          <select id="wheel-new-category">
            <option>한식</option><option>중식</option><option>일식</option>
            <option>양식</option><option>분식</option><option>기타</option>
          </select>
          <button class="btn-add" onclick="addMenuFromWheel()">+</button>
        </div>
        <div id="weight-list"></div>
      </div>
    </div>
  </div>

  <div id="right">
    <div class="panel-header">
      <div class="panel-tabs">
        <span class="ptab active" onclick="showPanel('history')">🕐 기록</span>
        <span class="ptab" onclick="showPanel('stats')">📊 통계</span>
      </div>
      <button class="btn-clear" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div id="history-list" class="panel-view active"></div>
    <div id="stats-content" class="panel-view"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>메뉴 수정</h3>
    <input type="text" id="edit-name" placeholder="메뉴 이름" />
    <select id="edit-category">
      <option>한식</option><option>중식</option><option>일식</option>
      <option>양식</option><option>분식</option><option>기타</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let menus     = [];
  let history   = [];
  let weights   = {};   // { menuId: number }
  let editingId = null;
  let favOnly   = false;
  const selectedCats = new Set(['한식','중식','일식','양식','분식','기타']);

  // ── 탭 전환 ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
      if (tab.dataset.tab === 'wheel') setTimeout(() => { renderWeightList(); drawWheel(wheelAngle); }, 40);
      if (tab.dataset.tab === 'marble') setTimeout(() => initMarble(), 40);
    });
  });

  document.getElementById('new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addMenu(); });
  document.getElementById('wheel-new-name').addEventListener('keydown', e => { if (e.key === 'Enter') addMenuFromWheel(); });

  // ── 카테고리 필터 ──
  document.querySelectorAll('.cat-btn').forEach(btn => {
    if (btn.dataset.cat === '전체') return;
    btn.addEventListener('click', () => {
      btn.classList.toggle('active');
      if (btn.classList.contains('active')) selectedCats.add(btn.dataset.cat);
      else selectedCats.delete(btn.dataset.cat);
      // 전체 버튼 동기화
      const allActive = selectedCats.size === 6;
      document.querySelector('.cat-btn[data-cat="전체"]').classList.toggle('active', allActive);
      updatePickInfo(); renderWeightList(); drawWheel(wheelAngle);
    });
  });
  document.querySelector('.cat-btn[data-cat="전체"]').addEventListener('click', btn => {
    const allOn = selectedCats.size === 6;
    if (allOn) {
      selectedCats.clear();
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    } else {
      ['한식','중식','일식','양식','분식','기타'].forEach(c => selectedCats.add(c));
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.add('active'));
    }
    updatePickInfo(); renderWeightList(); drawWheel(wheelAngle);
  });

  function toggleFavOnly() {
    favOnly = !favOnly;
    document.getElementById('fav-toggle').classList.toggle('active', favOnly);
    updatePickInfo(); renderWeightList(); drawWheel(wheelAngle);
  }

  // ── 패널 탭 전환 ──
  function showPanel(name) {
    document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel-view').forEach(v => v.classList.remove('active'));
    document.querySelector(`.ptab[onclick="showPanel('${name}')"]`).classList.add('active');
    document.getElementById(name === 'history' ? 'history-list' : 'stats-content').classList.add('active');
  }

  // ── 데이터 로드 ──
  async function loadAll() { await loadMenus(); await loadHistory(); }

  async function loadMenus() {
    menus = await window.api.getMenus();
    menus.forEach(m => { if (weights[m.id] === undefined) weights[m.id] = 1; });
    renderMenus();
    updatePickInfo();
    renderWeightList();
    drawWheel(wheelAngle);
    initMarble();
  }

  // ── 필터 적용된 메뉴 목록 ──
  function getCooldownDays() { return parseInt(document.getElementById('cooldown-select').value) || 0; }

  function getRecentlyPickedNames() {
    const days = getCooldownDays();
    if (!days) return new Set();
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - days);
    return new Set(history.filter(h => new Date(h.picked_at) >= cutoff).map(h => h.menu_name));
  }

  function getFilteredMenus() {
    let list = menus.filter(m => !m.excluded);
    if (favOnly) list = list.filter(m => m.favorite);
    if (selectedCats.size < 6) list = list.filter(m => selectedCats.has(m.category));
    const recent = getRecentlyPickedNames();
    if (recent.size) list = list.filter(m => !recent.has(m.name));
    return list;
  }

  function renderMenus() {
    const list = document.getElementById('pick-menu-list');
    if (!menus.length) { list.innerHTML = '<div class="empty-state">등록된 메뉴가 없습니다.<br>아래에서 추가하세요!</div>'; return; }
    list.innerHTML = menus.map(m => `
      <div class="menu-item ${m.excluded ? 'excluded' : ''}">
        <span class="cat-badge">${m.category}</span>
        <span class="menu-name">${m.name}</span>
        ${m.excluded ? '<span class="excluded-tag">제외됨</span>' : ''}
        <button class="icon-btn fav-btn ${m.favorite ? 'active' : ''}" onclick="toggleFavorite(${m.id})" title="즐겨찾기">${m.favorite ? '★' : '☆'}</button>
        <button class="icon-btn exclude-btn" onclick="toggleExclude(${m.id})" title="${m.excluded ? '포함' : '제외'}">${m.excluded ? '✓' : '⊘'}</button>
        <button class="icon-btn" onclick="openEdit(${m.id})">✎</button>
        <button class="icon-btn danger" onclick="deleteMenu(${m.id})">✕</button>
      </div>`).join('');
  }

  function updatePickInfo() {
    const filtered = getFilteredMenus();
    const total    = menus.filter(m => !m.excluded).length;
    const parts = [];
    if (favOnly) parts.push('★즐겨찾기');
    if (selectedCats.size < 6) parts.push([...selectedCats].join('/'));
    const cooldown = getCooldownDays();
    if (cooldown) parts.push(`쿨다운${cooldown}일`);
    const filterStr = parts.length ? ` (${parts.join(', ')})` : '';
    document.getElementById('pick-info').textContent =
      `선택 가능: ${filtered.length}개 / 전체 ${total}개${filterStr}`;
  }

  // ── 가중치 (돌림판 전용 — 제외 여부만 반영) ──
  function getActiveItems() {
    return menus
      .filter(m => !m.excluded)
      .map(m => ({ ...m, weight: Math.max(1, weights[m.id] || 1) }));
  }
  function totalWeight(items) { return items.reduce((s, m) => s + m.weight, 0); }

  function renderWeightList() {
    const list   = document.getElementById('weight-list');
    const active = getActiveItems();
    const total  = totalWeight(active);

    if (!menus.length) { list.innerHTML = '<div class="empty-state">메뉴가 없습니다</div>'; return; }

    list.innerHTML = menus.map(m => {
      const w   = weights[m.id] || 1;
      const exc = !!m.excluded;
      const pct = exc ? 0 : (total > 0 ? Math.round((w / total) * 100) : 0);
      return `
        <div class="weight-item ${exc ? 'excluded' : ''}">
          <span class="weight-pct">${pct}%</span>
          <span class="weight-name" title="${m.name}">${m.name}</span>
          <div class="weight-controls">
            <button class="wc-btn" onclick="adjustWeight(${m.id},-1)" ${exc || w <= 1 ? 'disabled' : ''}>−</button>
            <input class="wc-input" type="number" min="1" max="99" value="${w}"
              onchange="setWeight(${m.id}, this.value)"
              oninput="setWeight(${m.id}, this.value)"
              ${exc ? 'disabled' : ''} />
            <button class="wc-btn" onclick="adjustWeight(${m.id},1)" ${exc || w >= 99 ? 'disabled' : ''}>＋</button>
            <button class="wc-btn wc-del" onclick="deleteMenu(${m.id})">✕</button>
          </div>
        </div>`;
    }).join('');
  }

  function adjustWeight(id, delta) {
    weights[id] = Math.min(99, Math.max(1, (weights[id] || 1) + delta));
    renderWeightList();
    drawWheel(wheelAngle);
  }

  function setWeight(id, val) {
    const n = parseInt(val);
    if (isNaN(n) || n < 1) return;
    weights[id] = Math.min(99, n);
    renderWeightList();
    drawWheel(wheelAngle);
  }

  function resetWeights() {
    menus.forEach(m => { weights[m.id] = 1; });
    renderWeightList();
    drawWheel(wheelAngle);
    showToast('가중치 초기화 완료');
  }

  // ── 메뉴 CRUD ──
  async function addMenu() {
    const nameEl = document.getElementById('new-name');
    const catEl  = document.getElementById('new-category');
    const name   = nameEl.value.trim();
    if (!name) return;
    const res = await window.api.addMenu({ name, category: catEl.value });
    if (res.success) { nameEl.value = ''; await loadMenus(); showToast(`"${name}" 추가됨`); }
    else showToast(res.error, true);
  }

  async function addMenuFromWheel() {
    const nameEl = document.getElementById('wheel-new-name');
    const catEl  = document.getElementById('wheel-new-category');
    const name   = nameEl.value.trim();
    if (!name) return;
    const res = await window.api.addMenu({ name, category: catEl.value });
    if (res.success) { nameEl.value = ''; await loadMenus(); showToast(`"${name}" 추가됨`); }
    else showToast(res.error, true);
  }

  async function deleteMenu(id) {
    const menu = menus.find(m => m.id === id);
    delete weights[id];
    await window.api.deleteMenu(id);
    await loadMenus();
    showToast(`"${menu.name}" 삭제됨`);
  }

  async function toggleExclude(id) { await window.api.toggleExclude(id); await loadMenus(); }

  async function toggleFavorite(id) { await window.api.toggleFavorite(id); await loadMenus(); }

  function openEdit(id) {
    editingId = id;
    const menu = menus.find(m => m.id === id);
    document.getElementById('edit-name').value     = menu.name;
    document.getElementById('edit-category').value = menu.category;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(() => document.getElementById('edit-name').focus(), 100);
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); editingId = null; }

  async function saveEdit() {
    const name     = document.getElementById('edit-name').value.trim();
    const category = document.getElementById('edit-category').value;
    if (!name) return;
    const res = await window.api.updateMenu({ id: editingId, name, category });
    if (res.success) { closeModal(); await loadMenus(); showToast('수정 완료'); }
    else showToast(res.error, true);
  }

  document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

  // ── 랜덤 뽑기 ──
  async function pickRandom() {
    const filtered = getFilteredMenus();
    if (!filtered.length) { showToast('선택 가능한 메뉴가 없어요!', true); return; }
    const card  = document.getElementById('result-card');
    const nameEl = document.getElementById('result-name');
    const catEl  = document.getElementById('result-category');
    let spin = setInterval(() => {
      const r = filtered[Math.floor(Math.random() * filtered.length)];
      nameEl.textContent = r.name; catEl.textContent = r.category;
    }, 80);
    setTimeout(async () => {
      clearInterval(spin);
      const picked = filtered[Math.floor(Math.random() * filtered.length)];
      nameEl.textContent = picked.name; catEl.textContent = picked.category;
      nameEl.classList.remove('pop'); void nameEl.offsetWidth; nameEl.classList.add('pop');
      card.classList.add('glow'); setTimeout(() => card.classList.remove('glow'), 2000);
      await window.api.recordPick(picked.name);
      await loadHistory();
    }, 1000);
  }

  // ── 히스토리 ──
  async function loadHistory() {
    history = await window.api.getHistory();
    const list = document.getElementById('history-list');
    if (!history.length) { list.innerHTML = '<div class="empty-state">아직 기록이 없습니다</div>'; }
    else {
      list.innerHTML = history.map(h => {
        const d = new Date(h.picked_at);
        const t = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
        return `<div class="history-item"><span class="history-name">${h.menu_name}</span><span class="history-time">${t}</span></div>`;
      }).join('');
    }
    renderStats();
    updatePickInfo();
  }

  async function clearHistory() { await window.api.clearHistory(); await loadHistory(); showToast('기록 삭제 완료'); }

  // ── 통계 ──
  function renderStats() {
    const el = document.getElementById('stats-content');
    if (!history.length) { el.innerHTML = '<div class="stat-empty">아직 기록이 없습니다</div>'; return; }

    // 메뉴별 횟수
    const counts = {};
    history.forEach(h => { counts[h.menu_name] = (counts[h.menu_name] || 0) + 1; });
    const top5   = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const maxCnt = top5[0][1];

    // 카테고리별 횟수
    const catMap = {};
    history.forEach(h => {
      const m = menus.find(x => x.name === h.menu_name);
      const cat = m ? m.category : '기타';
      catMap[cat] = (catMap[cat] || 0) + 1;
    });
    const topCat = Object.entries(catMap).sort((a, b) => b[1] - a[1])[0];

    el.innerHTML = `
      <div class="stats-section-title">자주 먹은 메뉴 TOP 5</div>
      ${top5.map(([name, cnt], i) => `
        <div class="stat-item">
          <span class="stat-rank">${i + 1}</span>
          <span class="stat-name">${name}</span>
          <div class="stat-bar-wrap"><div class="stat-bar" style="width:${Math.round(cnt/maxCnt*100)}%"></div></div>
          <span class="stat-count">${cnt}회</span>
        </div>`).join('')}
      <div class="stats-section-title" style="margin-top:6px">선호 카테고리</div>
      <div class="stat-item">
        <span class="stat-rank">1</span>
        <span class="stat-name">${topCat[0]}</span>
        <div class="stat-bar-wrap"><div class="stat-bar" style="width:100%"></div></div>
        <span class="stat-count">${topCat[1]}회</span>
      </div>
    `;
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── 돌림판 ───────────────────────────────────────────────
  const WHEEL_COLORS = [
    '#ff6b35','#4cc9f0','#06d6a0','#ffd166','#9b5de5',
    '#f15bb5','#118ab2','#ffb347','#e63946','#52c97b',
    '#00bbf9','#ef476f','#26c485','#ff9f1c','#4361ee',
  ];

  let wheelSpinning = false;
  let wheelAngle    = 0;

  function drawWheel(angle) {
    const canvas = document.getElementById('wheelCanvas');
    if (!canvas) return;
    const ctx  = canvas.getContext('2d');
    const W    = canvas.width, H = canvas.height;
    const cx   = W / 2, cy = H / 2, r = W / 2 - 4;
    const items = getActiveItems();
    ctx.clearRect(0, 0, W, H);

    if (!items.length) {
      ctx.fillStyle = '#17171a';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#777'; ctx.font = '13px Pretendard, sans-serif';
      ctx.textAlign = 'center'; ctx.fillText('선택 가능한 메뉴가 없습니다', cx, cy);
      return;
    }

    const total = totalWeight(items);
    let cur = angle;

    items.forEach((menu, i) => {
      const sa = (menu.weight / total) * Math.PI * 2;
      const s  = cur, e = cur + sa;

      ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, s, e); ctx.closePath();
      ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length]; ctx.fill();
      ctx.strokeStyle = '#0d0d0f'; ctx.lineWidth = 1.5; ctx.stroke();

      if (sa > 0.15) {
        ctx.save();
        ctx.translate(cx, cy); ctx.rotate(s + sa / 2);
        ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
        const fs = items.length > 12 ? 10 : 12;
        ctx.font = `600 ${fs}px Pretendard, sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,0.6)'; ctx.shadowBlur = 4;
        let label = menu.name;
        if (label.length > 5) label = label.slice(0, 5) + '…';
        ctx.fillText(label, r - 10, 4);
        ctx.restore();
      }
      cur = e;
    });

    // 중앙 원
    ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI * 2);
    ctx.fillStyle = '#0d0d0f'; ctx.fill();
    ctx.strokeStyle = '#2a2a30'; ctx.lineWidth = 2; ctx.stroke();
  }

  function spinWheel() {
    const items = getActiveItems();
    if (!items.length) { showToast('선택 가능한 메뉴가 없어요!', true); return; }
    if (wheelSpinning) return;
    wheelSpinning = true;

    const btn = document.getElementById('wheel-btn');
    const resultBox = document.getElementById('wheel-result');
    btn.disabled = true; resultBox.textContent = '';

    // 가중치 기반 랜덤 선택
    const total = totalWeight(items);
    let rand = Math.random() * total, targetIdx = items.length - 1;
    for (let i = 0; i < items.length; i++) { rand -= items[i].weight; if (rand <= 0) { targetIdx = i; break; } }

    // 목표 조각 중앙 각도
    let sliceStart = 0;
    for (let i = 0; i < targetIdx; i++) sliceStart += (items[i].weight / total) * Math.PI * 2;
    const sliceAngle = (items[targetIdx].weight / total) * Math.PI * 2;
    const sliceMid   = sliceStart + sliceAngle / 2;

    // 포인터(-π/2)가 sliceMid를 가리키도록 역산
    const targetAngle = -Math.PI / 2 - sliceMid;
    const extraSpins  = Math.PI * 2 * (6 + Math.floor(Math.random() * 4));
    const finalAngle  = targetAngle - extraSpins;

    const duration   = 4200 + Math.random() * 1200;
    const startAngle = wheelAngle;
    const startTime  = performance.now();

    function easeOut(t) { return 1 - Math.pow(1 - t, 3.5); }

    function animate(now) {
      const t = Math.min((now - startTime) / duration, 1);
      wheelAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
      drawWheel(wheelAngle);
      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        wheelAngle = finalAngle;
        wheelSpinning = false;
        btn.disabled = false;
        resultBox.textContent = `🎉 ${items[targetIdx].name}!`;
        window.api.recordPick(items[targetIdx].name).then(() => loadHistory());
      }
    }
    requestAnimationFrame(animate);
  }

  // ── 마블 룰렛 (Dynamic Plinko — 5구역) ──────────────────────────────
  const MARBLE_COLORS = [
    '#ff6b35','#4cc9f0','#06d6a0','#ffd166','#9b5de5',
    '#f15bb5','#118ab2','#ffb347','#e63946','#52c97b',
    '#00bbf9','#ef476f','#26c485','#ff9f1c','#4361ee',
  ];

  const MB_GRAVITY     = 0.22;
  const MB_DAMPING     = 0.990;
  const MB_RESTITUTION = 0.50;
  const MB_MARBLE_R    = 7;
  const MB_PEG_R       = 5;
  const MB_BUMPER_R    = 5;
  const MB_TRACK_H     = 3400;
  const MINIMAP_W      = 68;
  const MINIMAP_BORDER = 8;

  // 4개 구역 정의
  const MB_ZONES = [
    { y1:   70, y2:  720, label: 'ENTRY',  bg: 'rgba(255,107,53,0.04)'  },
    { y1:  720, y2: 1430, label: 'SLALOM', bg: 'rgba(155,93,229,0.05)'  },
    { y1: 1430, y2: 2370, label: 'MID',    bg: 'rgba(6,214,160,0.03)'   },
    { y1: 2370, y2: 3010, label: 'EXIT',   bg: 'rgba(255,209,102,0.04)' },
  ];

  let marbleItems     = [];
  let marbleBalls     = [];
  let marblePegs      = [];
  let marbleBumpers   = [];
  let marbleRotators  = [];
  let marbleRunning   = false;
  let marbleFinished  = false;
  let marbleAnimId    = null;
  let marbleExitOrder = [];
  let mbTrackW        = 360;

  function shadeColor(hex, pct) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, Math.max(0, (num >> 16) + pct));
    const g = Math.min(255, Math.max(0, ((num >> 8) & 0xff) + pct));
    const b = Math.min(255, Math.max(0, (num & 0xff) + pct));
    return `rgb(${r},${g},${b})`;
  }

  // 선분 위의 가장 가까운 점
  function pointSegClosest(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq < 0.001) return { dist: Math.hypot(px - x1, py - y1), cx: x1, cy: y1 };
    const t  = Math.max(0, Math.min(1, ((px - x1) * dx + (py - y1) * dy) / lenSq));
    const cx = x1 + t * dx, cy = y1 + t * dy;
    return { dist: Math.hypot(px - cx, py - cy), cx, cy };
  }

  function generatePegs(W) {
    marblePegs = [];
    const m  = MB_MARBLE_R * 3 + MB_PEG_R;
    const uW = W - m * 2;

    // Zone 1 ENTRY — 표준 플링코 7행
    for (let row = 0; row < 7; row++) {
      const y    = 100 + row * 84;
      const even = row % 2 === 0;
      const cols = even ? 7 : 6;
      const step = uW / cols;
      const ox   = even ? m : m + step * 0.5;
      for (let col = 0; col < cols; col++) {
        marblePegs.push({ x: ox + col * step, y, r: MB_PEG_R });
      }
    }

    // Zone 3 MID — 지그재그 (좌우 교대 통로)
    const MID_Y0   = 1500;
    const MID_ROWS = 7;
    const MID_DY   = 130;
    const PASS_W   = W * 0.25; // 통과 구멍 폭

    for (let row = 0; row < MID_ROWS; row++) {
      const y = MID_Y0 + row * MID_DY;
      // 짝수 행: 오른쪽에 구멍 / 홀수 행: 왼쪽에 구멍
      const passOnRight = row % 2 === 0;
      const passX0 = passOnRight ? W - m - PASS_W : m;
      const passX1 = passOnRight ? W - m           : m + PASS_W;

      const step = MB_PEG_R * 2 + 14;
      for (let x = m; x <= W - m; x += step) {
        if (x + MB_PEG_R > passX0 && x - MB_PEG_R < passX1) continue;
        marblePegs.push({ x, y, r: MB_PEG_R });
      }
    }

    // Zone 5 EXIT — 표준 플링코 7행
    for (let row = 0; row < 7; row++) {
      const y    = 2440 + row * 78;
      const even = row % 2 === 0;
      const cols = even ? 7 : 6;
      const step = uW / cols;
      const ox   = even ? m : m + step * 0.5;
      for (let col = 0; col < cols; col++) {
        marblePegs.push({ x: ox + col * step, y, r: MB_PEG_R });
      }
    }

  }

  function generateBumpers(W) {
    marbleBumpers = [];

    // Zone 2 SLALOM — 좌우 교번 대각선 범퍼 4개 (벽에 완전히 붙임)
    marbleBumpers.push(
      { x1: 1,     y1:  762, x2: W * 0.56, y2:  848, color: '#9b5de5' },
      { x1: W - 1, y1:  942, x2: W * 0.44, y2: 1028, color: '#9b5de5' },
      { x1: 1,     y1: 1112, x2: W * 0.56, y2: 1198, color: '#9b5de5' },
      { x1: W - 1, y1: 1282, x2: W * 0.44, y2: 1368, color: '#9b5de5' },
    );

    // Zone 6 NARROW — 최하단 좁은 도착 통로 (벽에 완전히 붙임)
    const nY1 = 3010, nY2 = 3138;
    const nHalf = 55;
    marbleBumpers.push(
      { x1: 1,     y1: nY1, x2: W / 2 - nHalf, y2: nY2, color: '#ff6b35' },
      { x1: W - 1, y1: nY1, x2: W / 2 + nHalf, y2: nY2, color: '#ff6b35' },
    );
  }

  function initMarble() {
    marbleItems     = menus.filter(m => !m.excluded);
    marbleExitOrder = [];
    marbleRunning   = false;
    marbleFinished  = false;
    marbleBalls     = [];
    marblePegs      = [];
    marbleBumpers   = [];
    marbleRotators  = [];
    if (marbleAnimId) { cancelAnimationFrame(marbleAnimId); marbleAnimId = null; }

    const canvas  = document.getElementById('marbleCanvas');
    const minimap = document.getElementById('marbleMinimap');
    const wrap    = document.getElementById('marble-track-wrap');
    const layout  = document.getElementById('marble-layout');
    if (!canvas || !wrap) return;

    mbTrackW      = Math.max(wrap.clientWidth - 2, 280);
    canvas.width  = mbTrackW;
    canvas.height = MB_TRACK_H;

    const mmH = layout ? Math.max(layout.clientHeight - 2, 200) : 400;
    minimap.width  = MINIMAP_W;
    minimap.height = mmH;

    wrap.scrollTop = 0;

    generatePegs(mbTrackW);
    generateBumpers(mbTrackW);

    // 회전 구조물: 왼쪽 NARROW 범퍼 끝점에 피벗 고정
    // 팔 길이(105) < 피벗~오른쪽 범퍼 거리(110) → 25° 이상 기울면 틈 생겨 구슬 통과 가능
    marbleRotators = [
      { cx: mbTrackW / 2 - 55, cy: 3138, armLen: 105, angle: 0, speed: -0.022, armR: 6, arms: 2 },
    ];

    // 범퍼-회전구조물 접합점에 junction peg 추가 — 쐐기 진입 차단
    marblePegs.push({ x: mbTrackW / 2 - 55, y: 3138, r: MB_BUMPER_R + 2 });

    document.getElementById('marble-result').textContent    = '';
    document.getElementById('marble-start-btn').disabled    = false;
    document.getElementById('marble-start-btn').textContent = '출 발 !';
    document.getElementById('marble-skip-btn').disabled     = true;

    if (!marbleItems.length) {
      drawMarbleTrack(canvas);
      drawMinimap(minimap, wrap);
      return;
    }

    const padding = MB_MARBLE_R * 4;
    marbleItems.forEach((m, i) => {
      const t = marbleItems.length > 1 ? i / (marbleItems.length - 1) : 0.5;
      const x = padding + t * (mbTrackW - padding * 2) + (Math.random() - 0.5) * 6;
      const y = 30 + Math.random() * 20;
      marbleBalls.push({
        menu      : m,
        color     : MARBLE_COLORS[i % MARBLE_COLORS.length],
        x, y,
        vx        : (Math.random() - 0.5) * 1.2,
        vy        : Math.random() * 0.5,
        r         : MB_MARBLE_R,
        exited    : false,
        _stuckTick: 0,
        _prevY    : y,
      });
    });

    drawMarbleTrack(canvas);
    drawMinimap(minimap, wrap);
  }

  function drawMarbleTrack(canvas) {
    const ctx = canvas.getContext('2d');
    const W   = canvas.width;
    const H   = canvas.height;

    ctx.fillStyle = '#0d0d0f';
    ctx.fillRect(0, 0, W, H);

    // 구역 배경
    MB_ZONES.forEach(z => {
      ctx.fillStyle = z.bg;
      ctx.fillRect(0, z.y1, W, z.y2 - z.y1);
    });

    // 구역 구분선 + 레이블
    ctx.font = '9px monospace';
    MB_ZONES.forEach((z, i) => {
      ctx.fillStyle  = 'rgba(255,255,255,0.14)';
      ctx.textAlign  = 'left';
      ctx.fillText(z.label, 6, z.y1 + 12);
      if (i > 0) {
        ctx.strokeStyle = 'rgba(255,255,255,0.07)';
        ctx.lineWidth   = 1;
        ctx.setLineDash([3, 7]);
        ctx.beginPath(); ctx.moveTo(0, z.y1); ctx.lineTo(W, z.y1); ctx.stroke();
        ctx.setLineDash([]);
      }
    });

    // 좌우 벽
    ctx.strokeStyle = '#2a2a32';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.moveTo(1, 0); ctx.lineTo(1, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(W - 1, 0); ctx.lineTo(W - 1, H); ctx.stroke();

    // FINISH 라인
    const exitY = H - 60;
    ctx.strokeStyle = '#ff6b35';
    ctx.lineWidth   = 2;
    ctx.setLineDash([5, 4]);
    ctx.beginPath(); ctx.moveTo(0, exitY); ctx.lineTo(W, exitY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle  = '#ff6b35';
    ctx.font       = '11px Pretendard, sans-serif';
    ctx.textAlign  = 'center';
    ctx.fillText('FINISH', W / 2, exitY - 6);

    // 범퍼
    ctx.lineCap = 'round';
    marbleBumpers.forEach(seg => {
      ctx.lineWidth   = 12;
      ctx.strokeStyle = seg.color;
      ctx.globalAlpha = 0.25;
      ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.lineWidth   = 7;
      ctx.strokeStyle = seg.color;
      ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
      ctx.lineWidth   = 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.28)';
      ctx.beginPath(); ctx.moveTo(seg.x1, seg.y1); ctx.lineTo(seg.x2, seg.y2); ctx.stroke();
    });
    ctx.lineCap = 'butt';

    // 회전 구조물
    marbleRotators.forEach(rot => {
      for (let i = 0; i < (rot.arms || 2); i++) {
        const a  = rot.angle + i * Math.PI;
        const x2 = rot.cx + Math.cos(a) * rot.armLen;
        const y2 = rot.cy + Math.sin(a) * rot.armLen;
        ctx.lineCap    = 'round';
        ctx.lineWidth  = rot.armR * 2 + 6;
        ctx.strokeStyle = 'rgba(255,179,71,0.2)';
        ctx.beginPath(); ctx.moveTo(rot.cx, rot.cy); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.lineWidth   = rot.armR * 2;
        ctx.strokeStyle = '#ffb347';
        ctx.beginPath(); ctx.moveTo(rot.cx, rot.cy); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.lineCap = 'butt';
      }
      ctx.beginPath();
      ctx.arc(rot.cx, rot.cy, 7, 0, Math.PI * 2);
      ctx.fillStyle   = '#ffb347';
      ctx.fill();
      ctx.strokeStyle = '#0d0d0f';
      ctx.lineWidth   = 2;
      ctx.stroke();
    });

    // 핀
    marblePegs.forEach(p => {
      const g = ctx.createRadialGradient(p.x - 1.5, p.y - 1.5, 0.5, p.x, p.y, p.r);
      g.addColorStop(0, '#6a6a80');
      g.addColorStop(1, '#2a2a35');
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });

    if (!marbleItems.length) {
      ctx.fillStyle = '#555';
      ctx.font      = '13px Pretendard, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('선택 가능한 메뉴가 없습니다', W / 2, 80);
      return;
    }

    // 탈락 순서 (상단)
    if (marbleExitOrder.length > 0) {
      ctx.fillStyle = '#555';
      ctx.font      = '10px Pretendard, sans-serif';
      ctx.textAlign = 'left';
      const names = marbleExitOrder.map((b, idx) =>
        idx === marbleExitOrder.length - 1 && marbleFinished
          ? '[당첨] ' + b.menu.name : b.menu.name
      ).join(' > ');
      ctx.fillText(names, 8, 14);
    }

    // 구슬
    marbleBalls.forEach(b => {
      if (b.exited) return;
      ctx.beginPath();
      ctx.arc(b.x, b.y + 2, b.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.fill();
      const grad = ctx.createRadialGradient(
        b.x - b.r * 0.3, b.y - b.r * 0.35, b.r * 0.08, b.x, b.y, b.r
      );
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, b.color);
      grad.addColorStop(1, shadeColor(b.color, -60));
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();

      // 이름 레이블
      const rawName = b.menu.name;
      const labelText = rawName.length > 5 ? rawName.slice(0, 4) + '..' : rawName;
      ctx.font = 'bold 8px Pretendard, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      const tw = ctx.measureText(labelText).width;
      const lx = b.x;
      const ly = b.y - b.r - 2;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(lx - tw / 2 - 2, ly - 9, tw + 4, 9);
      ctx.fillStyle = '#fff';
      ctx.fillText(labelText, lx, ly);
      ctx.textBaseline = 'alphabetic';
    });
  }

  function drawMinimap(minimap, wrap) {
    if (!minimap) return;
    const mCtx  = minimap.getContext('2d');
    const mW    = minimap.width;
    const mH    = minimap.height;
    const scaleX = (mW - MINIMAP_BORDER * 2) / mbTrackW;
    const scaleY = (mH - MINIMAP_BORDER * 2) / MB_TRACK_H;
    const offX   = MINIMAP_BORDER;
    const offY   = MINIMAP_BORDER;

    mCtx.fillStyle = '#0d0d0f';
    mCtx.fillRect(0, 0, mW, mH);
    mCtx.fillStyle = '#141416';
    mCtx.fillRect(offX, offY, mW - MINIMAP_BORDER * 2, mH - MINIMAP_BORDER * 2);

    // 범퍼 (미니맵)
    mCtx.lineCap = 'round';
    marbleBumpers.forEach(seg => {
      mCtx.strokeStyle = seg.color;
      mCtx.lineWidth   = 2;
      mCtx.globalAlpha = 0.6;
      mCtx.beginPath();
      mCtx.moveTo(offX + seg.x1 * scaleX, offY + seg.y1 * scaleY);
      mCtx.lineTo(offX + seg.x2 * scaleX, offY + seg.y2 * scaleY);
      mCtx.stroke();
      mCtx.globalAlpha = 1;
    });
    mCtx.lineCap = 'butt';

    // 핀
    mCtx.fillStyle = '#3a3a4a';
    marblePegs.forEach(p => {
      mCtx.beginPath();
      mCtx.arc(offX + p.x * scaleX, offY + p.y * scaleY, 1, 0, Math.PI * 2);
      mCtx.fill();
    });

    // FINISH 라인
    const exitMY = offY + (MB_TRACK_H - 60) * scaleY;
    mCtx.strokeStyle = 'rgba(255,107,53,0.5)';
    mCtx.lineWidth   = 1;
    mCtx.beginPath();
    mCtx.moveTo(offX, exitMY); mCtx.lineTo(mW - MINIMAP_BORDER, exitMY);
    mCtx.stroke();

    // 구슬
    marbleBalls.forEach(b => {
      if (b.exited) return;
      mCtx.beginPath();
      mCtx.arc(offX + b.x * scaleX, offY + b.y * scaleY, Math.max(2, MB_MARBLE_R * scaleX), 0, Math.PI * 2);
      mCtx.fillStyle = b.color;
      mCtx.fill();
    });

    // 뷰포트 표시
    if (wrap) {
      const vpTop = offY + wrap.scrollTop * scaleY;
      const vpH   = wrap.clientHeight * scaleY;
      mCtx.strokeStyle = 'rgba(255,255,255,0.2)';
      mCtx.lineWidth   = 1;
      mCtx.strokeRect(offX, vpTop, mW - MINIMAP_BORDER * 2, vpH);
    }
  }

  function physicsStep() {
    const W      = mbTrackW;
    const exitY  = MB_TRACK_H - 60;
    const active = marbleBalls.filter(b => !b.exited);

    // 회전 구조물 각도 업데이트
    marbleRotators.forEach(rot => { rot.angle += rot.speed; });

    active.forEach(b => {
      b.vy += MB_GRAVITY;
      b.vx *= MB_DAMPING;
      b.vy *= MB_DAMPING;

      // 속도가 너무 작으면 하향 가속
      if (Math.hypot(b.vx, b.vy) < 0.8) b.vy += 0.8;

      // 최대 속도 제한 — 충돌 감지 거리(13px)보다 작게 유지해 터널링 방지
      const MAX_SPD = 10;
      if (b.vx >  MAX_SPD) b.vx =  MAX_SPD;
      if (b.vx < -MAX_SPD) b.vx = -MAX_SPD;
      if (b.vy >  MAX_SPD) b.vy =  MAX_SPD;
      if (b.vy < -MAX_SPD) b.vy = -MAX_SPD;

      b.x  += b.vx;
      b.y  += b.vy;

      // 끼임 감지: 매 프레임 Y 하강량 누적 추적
      const _dy = b.y - b._prevY;
      b._prevY  = b.y;
      if (_dy < 0.3) {
        b._stuckTick++;
      } else {
        b._stuckTick = Math.max(0, b._stuckTick - 1);
      }
      if (b._stuckTick === 30) {
        b.vx = (Math.random() - 0.5) * 10;
        b.vy = Math.max(b.vy + 3, 5);
      } else if (b._stuckTick === 60) {
        b.vx = (Math.random() - 0.5) * 10;
        b.vy = Math.max(b.vy + 5, 7);
      } else if (b._stuckTick >= 90) {
        b.y  -= 30;
        b.vy  = 0;
        b._stuckTick = 0;
      }

      // 좌우 벽
      if (b.x - b.r < 1) {
        b.x  = 1 + b.r;
        b.vx = Math.abs(b.vx) * MB_RESTITUTION;
      } else if (b.x + b.r > W - 1) {
        b.x  = W - 1 - b.r;
        b.vx = -Math.abs(b.vx) * MB_RESTITUTION;
      }

      // 충돌 해결 — 3패스 반복 (속도 반사는 첫 패스에서만, 이후는 위치 보정 전용)
      for (let pass = 0; pass < 3; pass++) {
        const firstPass = (pass === 0);

        // 범퍼 충돌
        marbleBumpers.forEach(seg => {
          const { dist, cx, cy } = pointSegClosest(b.x, b.y, seg.x1, seg.y1, seg.x2, seg.y2);
          const minD = b.r + MB_BUMPER_R;
          if (dist < minD && dist > 0) {
            const nx  = (b.x - cx) / dist;
            const ny  = (b.y - cy) / dist;
            if (firstPass) {
              const dot = b.vx * nx + b.vy * ny;
              if (dot < 0) {
                b.vx = (b.vx - 2 * dot * nx) * MB_RESTITUTION;
                b.vy = (b.vy - 2 * dot * ny) * MB_RESTITUTION;
              }
            }
            b.x = cx + nx * (minD + 0.5);
            b.y = cy + ny * (minD + 0.5);
          }
        });

        // 회전 구조물 충돌
        marbleRotators.forEach(rot => {
          for (let i = 0; i < (rot.arms || 2); i++) {
            const a  = rot.angle + i * Math.PI;
            const x2 = rot.cx + Math.cos(a) * rot.armLen;
            const y2 = rot.cy + Math.sin(a) * rot.armLen;
            const { dist, cx: ncx, cy: ncy } = pointSegClosest(b.x, b.y, rot.cx, rot.cy, x2, y2);
            const minD = b.r + rot.armR;
            if (dist < minD && dist > 0) {
              const nx  = (b.x - ncx) / dist;
              const ny  = (b.y - ncy) / dist;
              if (firstPass) {
                const dot = b.vx * nx + b.vy * ny;
                if (dot < 0) {
                  b.vx = (b.vx - 2 * dot * nx) * MB_RESTITUTION;
                  b.vy = (b.vy - 2 * dot * ny) * MB_RESTITUTION;
                }
              }
              b.x = ncx + nx * (minD + 0.5);
              b.y = ncy + ny * (minD + 0.5);
            }
          }
        });

        // 핀 충돌
        marblePegs.forEach(p => {
          const dx   = b.x - p.x;
          const dy   = b.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const minD = b.r + p.r;
          if (dist < minD && dist > 0) {
            const nx  = dx / dist;
            const ny  = dy / dist;
            if (firstPass) {
              const dot = b.vx * nx + b.vy * ny;
              b.vx = (b.vx - 2 * dot * nx) * MB_RESTITUTION;
              b.vy = (b.vy - 2 * dot * ny) * MB_RESTITUTION;
            }
            b.x = p.x + nx * (minD + 0.5);
            b.y = p.y + ny * (minD + 0.5);
          }
        });

        // 벽 이탈 방지 클램프 (패스마다 재적용)
        if (b.x - b.r < 1)     { b.x = 1 + b.r;     if (firstPass) b.vx =  Math.abs(b.vx) * MB_RESTITUTION; }
        if (b.x + b.r > W - 1) { b.x = W - 1 - b.r; if (firstPass) b.vx = -Math.abs(b.vx) * MB_RESTITUTION; }
      }

      if (b.y > exitY) {
        b.exited = true;
        marbleExitOrder.push(b);
      }
    });

    // 구슬 간 충돌
    for (let i = 0; i < active.length; i++) {
      for (let j = i + 1; j < active.length; j++) {
        const a = active[i], b = active[j];
        if (a.exited || b.exited) continue;
        const dx   = b.x - a.x;
        const dy   = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minD = a.r + b.r;
        if (dist < minD && dist > 0) {
          const nx  = dx / dist;
          const ny  = dy / dist;
          const ov  = (minD - dist) / 2;
          a.x -= nx * ov; a.y -= ny * ov;
          b.x += nx * ov; b.y += ny * ov;
          const v1n = a.vx * nx + a.vy * ny;
          const v2n = b.vx * nx + b.vy * ny;
          a.vx += (v2n - v1n) * nx * MB_RESTITUTION;
          a.vy += (v2n - v1n) * ny * MB_RESTITUTION;
          b.vx += (v1n - v2n) * nx * MB_RESTITUTION;
          b.vy += (v1n - v2n) * ny * MB_RESTITUTION;
        }
      }
    }

    // 구슬 간 충돌 후 장애물 위치 재보정 — 구슬에 밀려 장애물 안으로 들어간 경우 교정
    active.forEach(b => {
      if (b.exited) return;
      marbleBumpers.forEach(seg => {
        const { dist, cx, cy } = pointSegClosest(b.x, b.y, seg.x1, seg.y1, seg.x2, seg.y2);
        const minD = b.r + MB_BUMPER_R;
        if (dist < minD && dist > 0) {
          const nx = (b.x - cx) / dist;
          const ny = (b.y - cy) / dist;
          b.x = cx + nx * (minD + 0.5);
          b.y = cy + ny * (minD + 0.5);
        }
      });
      marbleRotators.forEach(rot => {
        for (let i = 0; i < (rot.arms || 2); i++) {
          const a  = rot.angle + i * Math.PI;
          const x2 = rot.cx + Math.cos(a) * rot.armLen;
          const y2 = rot.cy + Math.sin(a) * rot.armLen;
          const { dist, cx: ncx, cy: ncy } = pointSegClosest(b.x, b.y, rot.cx, rot.cy, x2, y2);
          const minD = b.r + rot.armR;
          if (dist < minD && dist > 0) {
            const nx = (b.x - ncx) / dist;
            const ny = (b.y - ncy) / dist;
            b.x = ncx + nx * (minD + 0.5);
            b.y = ncy + ny * (minD + 0.5);
          }
        }
      });
      marblePegs.forEach(p => {
        const dx = b.x - p.x, dy = b.y - p.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minD = b.r + p.r;
        if (dist < minD && dist > 0) {
          b.x = p.x + (dx / dist) * (minD + 0.5);
          b.y = p.y + (dy / dist) * (minD + 0.5);
        }
      });
      if (b.x - b.r < 1)     b.x = 1 + b.r;
      if (b.x + b.r > W - 1) b.x = W - 1 - b.r;
    });
  }

  function autoScrollToLast() {
    const wrap = document.getElementById('marble-track-wrap');
    if (!wrap) return;
    const active = marbleBalls.filter(b => !b.exited);
    if (!active.length) return;
    const last   = active.reduce((a, b) => b.y > a.y ? b : a);
    wrap.scrollTop = Math.max(0, last.y - wrap.clientHeight * 0.45);
  }

  function startMarble() {
    if (marbleFinished) { initMarble(); return; }
    if (marbleRunning) return;
    if (!marbleItems.length) { showToast('선택 가능한 메뉴가 없어요!', true); return; }

    marbleRunning = true;
    document.getElementById('marble-start-btn').disabled = true;
    document.getElementById('marble-skip-btn').disabled  = false;

    const canvas  = document.getElementById('marbleCanvas');
    const minimap = document.getElementById('marbleMinimap');
    const wrap    = document.getElementById('marble-track-wrap');

    function frame() {
      physicsStep();
      drawMarbleTrack(canvas);
      drawMinimap(minimap, wrap);

      if (marbleBalls.filter(b => !b.exited).length === 0) {
        marbleRunning  = false;
        marbleFinished = true;
        const winner = marbleExitOrder[marbleExitOrder.length - 1];
        document.getElementById('marble-result').textContent    = winner.menu.name + ' 당첨!';
        document.getElementById('marble-start-btn').disabled    = false;
        document.getElementById('marble-start-btn').textContent = '다시 하기';
        document.getElementById('marble-skip-btn').disabled     = true;
        window.api.recordPick(winner.menu.name).then(() => loadHistory());
        return;
      }
      marbleAnimId = requestAnimationFrame(frame);
    }
    marbleAnimId = requestAnimationFrame(frame);
  }

  function skipMarble() {
    if (!marbleRunning) return;
    cancelAnimationFrame(marbleAnimId);

    marbleBalls.filter(b => !b.exited)
      .sort(() => Math.random() - 0.5)
      .forEach(b => { b.exited = true; marbleExitOrder.push(b); });

    marbleRunning  = false;
    marbleFinished = true;

    const canvas  = document.getElementById('marbleCanvas');
    const minimap = document.getElementById('marbleMinimap');
    const wrap    = document.getElementById('marble-track-wrap');
    drawMarbleTrack(canvas);
    drawMinimap(minimap, wrap);

    const winner = marbleExitOrder[marbleExitOrder.length - 1];
    document.getElementById('marble-result').textContent    = winner.menu.name + ' 당첨!';
    document.getElementById('marble-start-btn').disabled    = false;
    document.getElementById('marble-start-btn').textContent = '다시 하기';
    document.getElementById('marble-skip-btn').disabled     = true;
    window.api.recordPick(winner.menu.name).then(() => loadHistory());
  }

  // ── Init ──
  loadAll();
</script>
