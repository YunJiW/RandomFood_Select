<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점심 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="titlebar">
  <span>점심 뭐 먹지? 🍱</span>
  <div class="win-btns">
    <button class="dot g" onclick="window.api.maximizeApp()" title="최대화"></button>
    <button class="dot y" onclick="window.api.minimizeApp()" title="최소화"></button>
    <button class="dot r" onclick="window.api.closeApp()" title="종료"></button>
  </div>
</div>

<div id="app">
  <div id="left">
    <div id="tabs">
      <div class="tab active" data-tab="pick">랜덤 뽑기</div>
      <div class="tab" data-tab="wheel">돌림판</div>
      <div class="tab" data-tab="marble">마블 룰렛</div>
    </div>

    <!-- Pick Tab -->
    <div class="tab-content active" id="pick-tab">
      <div id="pick-main">
        <div class="pick-title">오늘의 점심은?</div>
        <div id="cat-filter">
          <button class="cat-btn active" data-cat="전체">전체</button>
          <button class="cat-btn active" data-cat="한식">한식</button>
          <button class="cat-btn active" data-cat="중식">중식</button>
          <button class="cat-btn active" data-cat="일식">일식</button>
          <button class="cat-btn active" data-cat="양식">양식</button>
          <button class="cat-btn active" data-cat="분식">분식</button>
          <button class="cat-btn active" data-cat="기타">기타</button>
        </div>
        <div id="result-card">
          <div id="result-category">메뉴를 뽑아보세요</div>
          <div id="result-name">?</div>
        </div>
        <button id="pick-btn" onclick="pickRandom()">뽑 기 !</button>
        <div id="pick-options">
          <label class="opt-label">
            쿨다운
            <select id="cooldown-select" onchange="updatePickInfo()">
              <option value="0">없음</option>
              <option value="1">1일</option>
              <option value="3">3일</option>
              <option value="7">7일</option>
            </select>
          </label>
          <button class="opt-toggle" id="fav-toggle" onclick="toggleFavOnly()">★ 즐겨찾기만</button>
        </div>
        <div id="pick-info"></div>
      </div>
      <div id="pick-menu-list"></div>
      <div class="menu-add-bar">
        <input type="text" id="new-name" placeholder="메뉴 이름 입력" />
        <select id="new-category">
          <option>한식</option><option>중식</option><option>일식</option>
          <option>양식</option><option>분식</option><option>기타</option>
        </select>
        <button class="btn-add" onclick="addMenu()">추가</button>
      </div>
    </div>

    <!-- Marble Tab -->
    <div class="tab-content" id="marble-tab">
      <div id="marble-layout">
        <canvas id="marbleMinimap"></canvas>
        <div id="marble-track-wrap">
          <canvas id="marbleCanvas"></canvas>
        </div>
      </div>
      <div id="marble-result"></div>
      <div id="marble-controls">
        <button id="marble-start-btn" onclick="startMarble()">출 발 !</button>
        <button id="marble-skip-btn" onclick="skipMarble()" disabled>건너뛰기</button>
      </div>
    </div>

    <!-- Wheel Tab -->
    <div class="tab-content" id="wheel-tab">
      <div id="wheel-left">
        <div class="wheel-container">
          <canvas id="wheelCanvas" width="280" height="280"></canvas>
          <div class="wheel-pointer">▼</div>
        </div>
        <button id="wheel-btn" onclick="spinWheel()">돌 리 기 !</button>
        <div id="wheel-result" class="wheel-result-box"></div>
      </div>
      <div id="wheel-right">
        <div class="weight-header">
          <h3>⚖ 가중치 설정</h3>
          <button class="btn-reset-weights" onclick="resetWeights()">초기화</button>
        </div>
        <div class="wheel-add-bar">
          <input type="text" id="wheel-new-name" placeholder="메뉴 추가" />
          <select id="wheel-new-category">
            <option>한식</option><option>중식</option><option>일식</option>
            <option>양식</option><option>분식</option><option>기타</option>
          </select>
          <button class="btn-add" onclick="addMenuFromWheel()">+</button>
        </div>
        <div id="weight-list"></div>
      </div>
    </div>
  </div>

  <div id="right">
    <div class="panel-header">
      <div class="panel-tabs">
        <span class="ptab active" onclick="showPanel('history')">🕐 기록</span>
        <span class="ptab" onclick="showPanel('stats')">📊 통계</span>
      </div>
      <button class="btn-clear" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div id="history-list" class="panel-view active"></div>
    <div id="stats-content" class="panel-view"></div>
  </div>
</div>

<div id="modal-overlay">
  <div id="modal">
    <h3>메뉴 수정</h3>
    <input type="text" id="edit-name" placeholder="메뉴 이름" />
    <select id="edit-category">
      <option>한식</option><option>중식</option><option>일식</option>
      <option>양식</option><option>분식</option><option>기타</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="renderer.js"></script>
</body>
</html>
