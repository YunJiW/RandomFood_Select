<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘 뭐 먹지?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 사용자 지정 타이틀바 -->
<div id="titlebar">
  <span>오늘 뭐 먹지?</span>
  <div class="win-btns">
    <button class="dot g" onclick="window.api.maximizeApp()" title="최대화"></button>
    <button class="dot y" onclick="window.api.minimizeApp()" title="최소화"></button>
    <button class="dot r" onclick="window.api.closeApp()" title="종료"></button>
  </div>
</div>

<!-- 메인 앱 레이아웃 -->
<div id="app">
  <!-- 메뉴 선택과 룰렛이 들어가는 왼쪽 영역 -->
  <div id="left">
    <div id="left-sidebar">
      <div id="tabs">
        <div class="tab active" data-tab="pick">
          <span class="tab-kicker">PICK</span>
          <span class="tab-label">랜덤 뽑기</span>
        </div>
        <div class="tab" data-tab="wheel">
          <span class="tab-kicker">WHEEL</span>
          <span class="tab-label">돌림판</span>
        </div>
        <div class="tab" data-tab="marble">
          <span class="tab-kicker">MARBLE</span>
          <span class="tab-label">마블 룰렛</span>
        </div>
      </div>
    </div>

    <div id="left-body">
      <div id="tab-panels">
    <div class="tab-content active" id="pick-tab">
      <div id="pick-main">
        <div class="pick-title">오늘 뭐 먹지?</div>
        <div id="cat-filter">
          <button class="cat-btn active" data-cat="전체">전체</button>
          <button class="cat-btn active" data-cat="한식">한식</button>
          <button class="cat-btn active" data-cat="중식">중식</button>
          <button class="cat-btn active" data-cat="일식">일식</button>
          <button class="cat-btn active" data-cat="양식">양식</button>
          <button class="cat-btn active" data-cat="분식">분식</button>
          <button class="cat-btn active" data-cat="기타">기타</button>
        </div>
        <div id="result-card">
          <div id="result-category">메뉴를 뽑아보세요</div>
          <div id="result-name">?</div>
        </div>
        <div class="pick-action-row">
          <button id="pick-btn" onclick="pickRandom()">뽑기!</button>
          <button id="pick-map-btn" class="secondary-action-btn" onclick="openPickedMenuMap()" disabled>근처 가게 찾기</button>
        </div>
        <div id="pick-options">
          <label class="opt-label">
            쿨다운
            <select id="cooldown-select" onchange="updatePickInfo()">
              <option value="0">없음</option>
              <option value="1">1일</option>
              <option value="3">3일</option>
              <option value="7">7일</option>
            </select>
          </label>
          <button class="opt-toggle" id="fav-toggle" onclick="toggleFavOnly()">★ 즐겨찾기만</button>
        </div>
        <div id="pick-info"></div>
      </div>
      <div id="pick-menu-list"></div>
      <div class="menu-add-bar">
        <input type="text" id="new-name" placeholder="메뉴 이름 입력" />
        <select id="new-category">
          <option>한식</option><option>중식</option><option>일식</option>
          <option>양식</option><option>분식</option><option>기타</option>
        </select>
        <button class="btn-add" onclick="addMenu()">추가</button>
      </div>
    </div>

    <div class="tab-content" id="marble-tab">
      <div id="marble-layout">
        <canvas id="marbleMinimap"></canvas>
        <div id="marble-track-panel">
          <div id="marble-track-wrap">
            <canvas id="marbleCanvas"></canvas>
          </div>
          <div id="marble-ranking" class="marble-ranking"></div>
        </div>
      </div>
      <div id="marble-result"></div>
      <div id="marble-controls">
        <button id="marble-start-btn" onclick="startMarble()">출발!</button>
        <button id="marble-shuffle-btn" onclick="shuffleMarbleBalls()">섞기</button>
        <button id="marble-skip-btn" onclick="skipMarble()" disabled>건너뛰기</button>
      </div>
    </div>

    <div class="tab-content" id="wheel-tab">
      <div id="wheel-left">
        <div class="wheel-container">
          <canvas id="wheelCanvas" width="280" height="280"></canvas>
          <div class="wheel-pointer">▼</div>
        </div>
        <div class="wheel-controls">
          <button id="wheel-btn" onclick="spinWheel()">돌리기!</button>
          <button id="wheel-skip-btn" class="wheel-secondary-btn" onclick="skipWheel()" disabled>바로 결과보기</button>
        </div>
        <div id="wheel-result" class="wheel-result-box"></div>
        <div class="wheel-controls">
          <button id="wheel-map-btn" class="wheel-secondary-btn" onclick="openWheelPickedMenuMap()" disabled>근처 가게 찾기</button>
        </div>
      </div>
    </div>
      </div>
    </div>
  </div>

  <!-- 최근 기록과 통계를 보여주는 오른쪽 패널 -->
  <div id="right" class="collapsed">
    <div class="panel-header">
      <div class="panel-tabs">
        <span class="ptab" data-panel="history" onclick="showPanel('history')">최근 기록</span>
        <span class="ptab" data-panel="stats" onclick="showPanel('stats')">통계</span>
        <span class="ptab wheel-only-tab" data-panel="weights" onclick="showPanel('weights')">가중치</span>
        <button class="ptab side-action-btn" onclick="testCurrentLocationMap()">지도 테스트</button>
      </div>
      <button class="btn-clear hidden" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div id="history-list" class="panel-view"></div>
    <div id="stats-content" class="panel-view"></div>
    <div id="wheel-side-panel" class="panel-view side-config-view">
      <div class="side-config-panel">
        <div class="weight-header">
          <h3>메뉴 가중치 설정</h3>
          <button class="btn-reset-weights" onclick="resetWeights()">초기화</button>
        </div>
        <div class="wheel-add-bar">
          <input type="text" id="wheel-new-name" placeholder="메뉴 추가" />
          <select id="wheel-new-category">
            <option>한식</option><option>중식</option><option>일식</option>
            <option>양식</option><option>분식</option><option>기타</option>
          </select>
          <button class="btn-add" onclick="addMenuFromWheel()">+</button>
        </div>
        <div id="weight-list"></div>
      </div>
    </div>
    <div id="marble-side-panel" class="panel-view marble-side-view">
      <div class="marble-count-panel">
        <div class="weight-header">
          <h3>구슬 수량 설정</h3>
          <button class="btn-reset-weights" onclick="resetMarbleCounts()">초기화</button>
        </div>
        <div class="wheel-add-bar marble-add-bar">
          <input type="text" id="marble-new-name" placeholder="메뉴 추가" />
          <select id="marble-new-category">
            <option>한식</option><option>중식</option><option>일식</option>
            <option>양식</option><option>분식</option><option>기타</option>
          </select>
          <button class="btn-add" onclick="addMenuFromMarble()">+</button>
        </div>
        <div id="marble-count-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- 메뉴 수정 모달 -->
<div id="modal-overlay">
  <div id="modal">
    <h3>메뉴 수정</h3>
    <input type="text" id="edit-name" placeholder="메뉴 이름" />
    <select id="edit-category">
      <option>한식</option><option>중식</option><option>일식</option>
      <option>양식</option><option>분식</option><option>기타</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 카카오 지도와 장소 검색 패널 -->
<div id="map-test-panel" class="map-test-panel">
  <div class="map-test-header">
    <div>
      <div class="map-test-title">근처 가게 찾기</div>
      <div id="map-status" class="map-status">버튼을 누르면 현재 위치 기반 지도를 불러옵니다.</div>
    </div>
    <button class="map-close-btn" onclick="hideMapPanel()">닫기</button>
  </div>
  <div class="map-key-row">
    <div class="map-key-note">지도 SDK 키는 앱 설정에서 자동으로 불러옵니다.</div>
    <button class="btn-add" onclick="testCurrentLocationMap()">지도 불러오기</button>
  </div>
  <label class="map-permission-toggle">
    <input type="checkbox" id="map-location-consent" />
    <span>현재 위치 사용 허용</span>
  </label>
  <div class="map-search-row">
    <input type="text" id="map-search-keyword" placeholder="예: 초밥, 카페, 햄버거" />
    <button class="btn-add" onclick="searchPlacesOnMap()">검색</button>
  </div>
  <div id="current-location-meta" class="current-location-meta"></div>
  <div id="kakao-map"></div>
  <div id="map-search-results" class="map-search-results"></div>
</div>

<!-- 현재 위치 사용 여부를 처음 확인하는 모달 -->
<div id="map-consent-modal" class="map-consent-modal">
  <div class="map-consent-dialog">
    <div class="map-consent-title">현재 위치 사용</div>
    <div class="map-consent-text">가까운 가게를 더 정확하게 찾기 위해 현재 위치를 사용할까요?</div>
    <div class="map-consent-subtext">거부하면 IP 기반 대략 위치로 지도를 불러옵니다.</div>
    <div class="map-consent-actions">
      <button class="btn-cancel" onclick="resolveMapConsent(false)">거부</button>
      <button class="btn-save" onclick="resolveMapConsent(true)">허용</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="renderer.js"></script>
</body>
</html>
