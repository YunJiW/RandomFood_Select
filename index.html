<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>점심 뭐 먹지?</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --accent:    #ff6b35;
      --accent2:   #ffb347;
      --text:      #f0f0f0;
      --muted:     #888;
      --danger:    #e05252;
      --success:   #52c97b;
      --excluded:  #3a3a3a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Titlebar ── */
    #titlebar {
      -webkit-app-region: drag;
      height: 40px;
      background: var(--bg);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; -webkit-app-region: no-drag; }
    .dot.r { background: #ff5f57; } .dot.y { background: #febc2e; } .dot.g { background: #28c840; }
    #titlebar span { margin-left: 8px; font-size: 13px; color: var(--muted); letter-spacing: 0.5px; }

    /* ── Layout ── */
    #app {
      display: grid;
      grid-template-columns: 1fr 320px;
      flex: 1;
      overflow: hidden;
    }

    /* ── Left Panel ── */
    #left {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* ── Tabs ── */
    #tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .tab {
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Tab Content ── */
    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ── Pick Tab ── */
    #pick-tab {
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 40px;
    }

    .pick-title {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 28px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    #result-card {
      width: 320px;
      height: 180px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    #result-card.glow {
      border-color: var(--accent);
      box-shadow: 0 0 40px rgba(255,107,53,0.25);
    }
    #result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 110%, rgba(255,107,53,0.08) 0%, transparent 70%);
    }
    #result-category {
      font-size: 12px;
      color: var(--accent);
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #result-name {
      font-family: 'Black Han Sans', sans-serif;
      font-size: 42px;
      color: var(--text);
      transition: transform 0.3s;
    }
    #result-name.pop { animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes pop {
      0%   { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    #pick-btn {
      padding: 16px 48px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(255,107,53,0.35);
    }
    #pick-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,53,0.45); }
    #pick-btn:active { transform: translateY(0); }

    #pick-info {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Menu Tab ── */
    #menu-tab { padding: 16px; gap: 12px; }

    .menu-toolbar {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .menu-toolbar input {
      flex: 1;
      padding: 9px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .menu-toolbar input:focus { border-color: var(--accent); }
    .menu-toolbar select {
      padding: 9px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
      cursor: pointer;
    }
    .btn-add {
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: background 0.2s;
    }
    .btn-add:hover { background: #e55a28; }

    #menu-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #menu-list::-webkit-scrollbar { width: 4px; }
    #menu-list::-webkit-scrollbar-track { background: transparent; }
    #menu-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: var(--surface);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: opacity 0.2s, background 0.2s;
    }
    .menu-item.excluded { opacity: 0.4; background: var(--excluded); }
    .menu-item .cat-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(255,107,53,0.15);
      color: var(--accent);
      font-weight: 500;
      white-space: nowrap;
    }
    .menu-item .menu-name { flex: 1; font-size: 14px; font-weight: 500; }
    .menu-item .excluded-tag {
      font-size: 10px;
      color: var(--muted);
      background: var(--surface2);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 4px;
      border-radius: 4px;
      font-size: 14px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.danger:hover { color: var(--danger); }
    .icon-btn.exclude-btn { color: var(--muted); }
    .menu-item:not(.excluded) .icon-btn.exclude-btn:hover { color: var(--danger); }
    .menu-item.excluded .icon-btn.exclude-btn { color: var(--success); }

    /* ── Wheel Tab ── */
    #wheel-tab {
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 20px;
      overflow: hidden;
    }
    .wheel-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }
    .wheel-container {
      position: relative;
      width: 420px;
      height: 420px;
    }
    #wheelCanvas {
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(255,107,53,0.2), 0 0 0 4px var(--border);
      display: block;
    }
    .wheel-pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      color: var(--accent);
      filter: drop-shadow(0 2px 6px rgba(255,107,53,0.7));
      z-index: 10;
      line-height: 1;
    }
    #wheel-btn {
      padding: 13px 44px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 20px;
      letter-spacing: 2px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(255,107,53,0.35);
    }
    #wheel-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,107,53,0.45); }
    #wheel-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .wheel-result-box {
      height: 36px;
      font-family: 'Black Han Sans', sans-serif;
      font-size: 22px;
      color: var(--accent);
      letter-spacing: 1px;
      text-align: center;
      transition: opacity 0.4s;
    }

    /* ── Right Panel ── */
    #right {
      display: flex;
      flex-direction: column;
      background: var(--surface);
    }

    .panel-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header h3 { font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    .btn-clear {
      font-size: 11px;
      padding: 4px 10px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    .btn-clear:hover { color: var(--danger); border-color: var(--danger); }

    #history-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--surface2);
      border-radius: 8px;
      animation: slideIn 0.25s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(20px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .history-name { font-size: 13px; font-weight: 500; }
    .history-time { font-size: 11px; color: var(--muted); }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
      line-height: 2;
    }

    /* ── Edit Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.show { display: flex; }
    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #modal h3 { font-size: 16px; font-weight: 700; }
    #modal input, #modal select {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-family: 'Noto Sans KR', sans-serif;
      outline: none;
    }
    #modal input:focus, #modal select:focus { border-color: var(--accent); }
    .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
    .btn-cancel {
      padding: 9px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
    }
    .btn-save {
      padding: 9px 18px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      transition: transform 0.3s ease;
      z-index: 200;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Titlebar -->
<div id="titlebar">
  <div class="dot r"></div>
  <div class="dot y"></div>
  <div class="dot g"></div>
  <span>점심 뭐 먹지? 🍱</span>
</div>

<!-- App -->
<div id="app">

  <!-- Left -->
  <div id="left">
    <div id="tabs">
      <div class="tab active" data-tab="pick">🎲 랜덤 뽑기</div>
      <div class="tab" data-tab="wheel">🎡 돌림판</div>
      <div class="tab" data-tab="menu">🍽 메뉴 관리</div>
    </div>

    <!-- Pick Tab -->
    <div class="tab-content active" id="pick-tab">
      <div class="pick-title">오늘의 점심은?</div>
      <div id="result-card">
        <div id="result-category">메뉴를 뽑아보세요</div>
        <div id="result-name">?</div>
      </div>
      <button id="pick-btn" onclick="pickRandom()">뽑 기 !</button>
      <div id="pick-info">제외된 메뉴는 선택에서 빠집니다</div>
    </div>

    <!-- Wheel Tab -->
    <div class="tab-content" id="wheel-tab">
      <div class="wheel-wrap">
        <div class="wheel-container">
          <canvas id="wheelCanvas" width="420" height="420"></canvas>
          <div class="wheel-pointer">▼</div>
        </div>
        <button id="wheel-btn" onclick="spinWheel()">돌 리 기 !</button>
        <div id="wheel-result" class="wheel-result-box"></div>
      </div>
    </div>

    <!-- Menu Tab -->
    <div class="tab-content" id="menu-tab">
      <div class="menu-toolbar">
        <input type="text" id="new-name" placeholder="메뉴 이름" />
        <select id="new-category">
          <option>한식</option>
          <option>중식</option>
          <option>일식</option>
          <option>양식</option>
          <option>분식</option>
          <option>기타</option>
        </select>
        <button class="btn-add" onclick="addMenu()">추가</button>
      </div>
      <div id="menu-list"></div>
    </div>
  </div>

  <!-- Right: History -->
  <div id="right">
    <div class="panel-header">
      <h3>🕐 최근 기록</h3>
      <button class="btn-clear" onclick="clearHistory()">전체 삭제</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="modal-overlay">
  <div id="modal">
    <h3>메뉴 수정</h3>
    <input type="text" id="edit-name" placeholder="메뉴 이름" />
    <select id="edit-category">
      <option>한식</option><option>중식</option><option>일식</option>
      <option>양식</option><option>분식</option><option>기타</option>
    </select>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  let menus = [];
  let editingId = null;

  // ── Tab switching ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById(tab.dataset.tab + '-tab').classList.add('active');
    });
  });

  // ── Enter key for add ──
  document.getElementById('new-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMenu();
  });

  // ── Load all data ──
  async function loadAll() {
    await loadMenus();
    await loadHistory();
  }

  async function loadMenus() {
    menus = await window.api.getMenus();
    renderMenus();
    updatePickInfo();
    drawWheel(wheelAngle);
  }

  function renderMenus() {
    const list = document.getElementById('menu-list');
    if (menus.length === 0) {
      list.innerHTML = '<div class="empty-state">등록된 메뉴가 없습니다.<br>위에서 메뉴를 추가하세요!</div>';
      return;
    }
    list.innerHTML = menus.map(m => `
      <div class="menu-item ${m.excluded ? 'excluded' : ''}" id="item-${m.id}">
        <span class="cat-badge">${m.category}</span>
        <span class="menu-name">${m.name}</span>
        ${m.excluded ? '<span class="excluded-tag">제외됨</span>' : ''}
        <button class="icon-btn exclude-btn" onclick="toggleExclude(${m.id})" title="${m.excluded ? '포함하기' : '제외하기'}">
          ${m.excluded ? '✓' : '⊘'}
        </button>
        <button class="icon-btn" onclick="openEdit(${m.id})" title="수정">✎</button>
        <button class="icon-btn danger" onclick="deleteMenu(${m.id})" title="삭제">✕</button>
      </div>
    `).join('');
  }

  function updatePickInfo() {
    const available = menus.filter(m => !m.excluded).length;
    document.getElementById('pick-info').textContent =
      `선택 가능 메뉴: ${available}개 / 전체 ${menus.length}개`;
  }

  async function addMenu() {
    const nameEl = document.getElementById('new-name');
    const catEl  = document.getElementById('new-category');
    const name = nameEl.value.trim();
    if (!name) return;
    const res = await window.api.addMenu({ name, category: catEl.value });
    if (res.success) {
      nameEl.value = '';
      await loadMenus();
      showToast(`"${name}" 추가됨`);
    } else {
      showToast(res.error, true);
    }
  }

  async function deleteMenu(id) {
    const menu = menus.find(m => m.id === id);
    await window.api.deleteMenu(id);
    await loadMenus();
    showToast(`"${menu.name}" 삭제됨`);
  }

  async function toggleExclude(id) {
    await window.api.toggleExclude(id);
    await loadMenus();
  }

  // ── Edit Modal ──
  function openEdit(id) {
    editingId = id;
    const menu = menus.find(m => m.id === id);
    document.getElementById('edit-name').value = menu.name;
    document.getElementById('edit-category').value = menu.category;
    document.getElementById('modal-overlay').classList.add('show');
    setTimeout(() => document.getElementById('edit-name').focus(), 100);
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('show');
    editingId = null;
  }

  async function saveEdit() {
    const name     = document.getElementById('edit-name').value.trim();
    const category = document.getElementById('edit-category').value;
    if (!name) return;
    const res = await window.api.updateMenu({ id: editingId, name, category });
    if (res.success) {
      closeModal();
      await loadMenus();
      showToast('수정 완료');
    } else {
      showToast(res.error, true);
    }
  }

  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  // ── Pick Random ──
  async function pickRandom() {
    const card = document.getElementById('result-card');
    const nameEl = document.getElementById('result-name');
    const catEl  = document.getElementById('result-category');

    // 룰렛 애니메이션
    const available = menus.filter(m => !m.excluded);
    if (available.length === 0) { showToast('선택 가능한 메뉴가 없어요!', true); return; }

    let i = 0;
    const spin = setInterval(() => {
      const rand = available[Math.floor(Math.random() * available.length)];
      nameEl.textContent = rand.name;
      catEl.textContent  = rand.category;
      i++;
    }, 80);

    setTimeout(async () => {
      clearInterval(spin);
      const res = await window.api.pickRandom();
      if (res.success) {
        nameEl.textContent = res.menu.name;
        catEl.textContent  = res.menu.category;
        nameEl.classList.remove('pop');
        void nameEl.offsetWidth;
        nameEl.classList.add('pop');
        card.classList.add('glow');
        setTimeout(() => card.classList.remove('glow'), 2000);
        await loadHistory();
      } else {
        showToast(res.error, true);
      }
    }, 1000);
  }

  // ── History ──
  async function loadHistory() {
    const history = await window.api.getHistory();
    const list = document.getElementById('history-list');
    if (history.length === 0) {
      list.innerHTML = '<div class="empty-state">아직 기록이 없습니다</div>';
      return;
    }
    list.innerHTML = history.map(h => {
      const d = new Date(h.picked_at);
      const time = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      return `<div class="history-item">
        <span class="history-name">${h.menu_name}</span>
        <span class="history-time">${time}</span>
      </div>`;
    }).join('');
  }

  async function clearHistory() {
    await window.api.clearHistory();
    await loadHistory();
    showToast('기록 삭제 완료');
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.borderColor = isError ? 'var(--danger)' : 'var(--success)';
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── Wheel (돌림판) ──────────────────────────────────────
  const WHEEL_COLORS = [
    '#ff6b35','#ff9f1c','#ffbf69','#06d6a0','#118ab2',
    '#9b5de5','#f15bb5','#00bbf9','#e63946','#52c97b',
    '#ffd166','#ef476f','#26c485','#4cc9f0','#f77f00',
  ];

  let wheelSpinning = false;
  let wheelAngle = 0;

  function drawWheel(angle) {
    const canvas = document.getElementById('wheelCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2, r = W / 2 - 4;
    const available = menus.filter(m => !m.excluded);
    ctx.clearRect(0, 0, W, H);

    if (available.length === 0) {
      ctx.fillStyle = '#1a1a1a';
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#888';
      ctx.font = '16px Noto Sans KR';
      ctx.textAlign = 'center';
      ctx.fillText('메뉴가 없습니다', cx, cy);
      return;
    }

    const slice = (Math.PI * 2) / available.length;

    available.forEach((menu, i) => {
      const start = angle + i * slice;
      const end   = start + slice;

      // 부채꼴
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
      ctx.fill();
      ctx.strokeStyle = '#0f0f0f';
      ctx.lineWidth = 2;
      ctx.stroke();

      // 텍스트
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(start + slice / 2);
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff';
      const fontSize = available.length > 10 ? 11 : 13;
      ctx.font = `bold ${fontSize}px Noto Sans KR`;
      ctx.shadowColor = 'rgba(0,0,0,0.5)';
      ctx.shadowBlur = 3;
      // 글자 길이 제한
      let label = menu.name;
      if (label.length > 5) label = label.slice(0, 5) + '…';
      ctx.fillText(label, r - 12, 5);
      ctx.restore();
    });

    // 중앙 원
    ctx.beginPath();
    ctx.arc(cx, cy, 22, 0, Math.PI * 2);
    ctx.fillStyle = '#0f0f0f';
    ctx.fill();
    ctx.strokeStyle = '#2e2e2e';
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  function spinWheel() {
    const available = menus.filter(m => !m.excluded);
    if (available.length === 0) { showToast('선택 가능한 메뉴가 없어요!', true); return; }
    if (wheelSpinning) return;
    wheelSpinning = true;

    const btn = document.getElementById('wheel-btn');
    const resultBox = document.getElementById('wheel-result');
    btn.disabled = true;
    resultBox.textContent = '';

    // 목표 인덱스 결정 (서버에서 랜덤 결정)
    const targetIdx = Math.floor(Math.random() * available.length);
    const slice = (Math.PI * 2) / available.length;

    // 포인터(상단, -π/2)가 targetIdx 조각 중앙을 가리키도록 최종 각도 계산
    // 조각 i의 중앙 각도 = i * slice + slice/2
    // 포인터 위치 = -π/2 (위쪽)
    // wheelAngle + i*slice + slice/2 = -π/2 + 2πk
    // => wheelAngle = -π/2 - i*slice - slice/2
    const targetAngle = -Math.PI / 2 - targetIdx * slice - slice / 2;
    const extraSpins  = (Math.PI * 2) * (6 + Math.floor(Math.random() * 4)); // 6~9바퀴
    const finalAngle  = targetAngle - extraSpins;

    const duration = 4000 + Math.random() * 1500; // 4~5.5초
    const startAngle = wheelAngle;
    const startTime  = performance.now();

    function easeOut(t) {
      // cubic ease-out
      return 1 - Math.pow(1 - t, 3);
    }

    function animate(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      wheelAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
      drawWheel(wheelAngle);

      if (t < 1) {
        requestAnimationFrame(animate);
      } else {
        wheelAngle = finalAngle;
        wheelSpinning = false;
        btn.disabled = false;

        const picked = available[targetIdx];
        resultBox.textContent = `🎉 ${picked.name}!`;

        // DB에 기록
        window.api.pickRandom().then(() => loadHistory());
      }
    }

    requestAnimationFrame(animate);
  }

  // 탭 전환 시 돌림판 다시 그리기
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      if (tab.dataset.tab === 'wheel') {
        setTimeout(() => drawWheel(wheelAngle), 50);
      }
    });
  });

  // ── Init ──
  loadAll();
</script>
</body>
</html>
